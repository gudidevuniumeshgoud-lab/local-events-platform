<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - EventHub</title>
  <meta name="description" content="Message and chat with event organizers and participants on EventHub.">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="stylesheet" href="css/responsive.css?v=3">
  <style>
    .chat-section {
      padding: 2rem;
      min-height: calc(100vh - 80px);
    }

    .chat-container {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: calc(100vh - 150px);

  overflow: hidden; /* ✅ ADD THIS */
}

    .chat-sidebar {
      border-right: 1px solid var(--surface-border);
      overflow-y: auto;
      background: rgba(15, 23, 42, 0.6);
      display: flex;
      flex-direction: column;
    }

    .chat-sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--surface-border);
    }

    .chat-sidebar h3 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--text-dark);
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 0.75rem;
    }

    .chat-user {
      padding: 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      margin-bottom: 0.5rem;
    }

    .chat-user:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(139, 92, 246, 0.3);
    }

    .chat-user.active {
      background: rgba(139, 92, 246, 0.15);
      border-color: var(--primary-color);
    }

    .chat-user-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
      color: var(--text-dark);
    }

    .chat-user-email {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .chat-window {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;  
      background: rgba(15, 23, 42, 0.3);
    }

    .chat-header {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--surface-border);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
    }

    .chat-header h3 {
      margin: 0;
      font-size: 1.15rem;
      color: var(--text-dark);
    }

    .chat-header small {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
        min-height: 0; 
    }

    .message {
      display: flex;
      animation: fadeInUp 0.3s ease;
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message.received {
      justify-content: flex-start;
    }

    .message-bubble {
      padding: 0.875rem 1.25rem;
      border-radius: 1rem;
      max-width: 70%;
      word-wrap: break-word;
      font-size: 0.95rem;
      line-height: 1.5;
       word-break: break-word;
  white-space: normal; 
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, var(--primary-color), #6d28d9);
      color: white;
      border-bottom-right-radius: 0.25rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .message.received .message-bubble {
      background: var(--surface-color);
      color: var(--text-dark);
      border: 1px solid var(--surface-border);
      border-bottom-left-radius: 0.25rem;
    }

    .message-time {
      font-size: 0.72rem;
      margin-top: 0.4rem;
      opacity: 0.65;
      text-align: right;
    }

  .chat-input-area {
  padding: 1.25rem 1.75rem;
  border-top: 1px solid var(--surface-border);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(10px);

  flex-shrink: 0;   /* ✅ KEEP */
  /* ❌ REMOVE sticky */
}

    .chat-input-form {
       flex-shrink: 0;
  position: sticky;
  bottom: 0;
  z-index: 5;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .chat-input-form input {
      flex: 1;
      padding: 0.875rem 1.25rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--surface-border);
      border-radius: 2rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      transition: all 0.3s ease;
    }

    .chat-input-form input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .chat-input-form input::placeholder {
      color: var(--text-light);
    }

    .chat-input-form button {
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, var(--primary-color), #6d28d9);
      color: white;
      border: none;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .chat-input-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-light);
      margin: auto;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .empty-state p {
      font-size: 1rem;
      max-width: 250px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Custom scrollbar */
    .messages-container::-webkit-scrollbar,
    .chat-sidebar::-webkit-scrollbar { width: 5px; }
    .messages-container::-webkit-scrollbar-thumb,
    .chat-sidebar::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 10px; }

    @media (max-width: 768px) {
      .chat-container {
        grid-template-columns: 1fr;
        height: auto;
        min-height: auto;
      }

      .chat-sidebar {
        border-right: none;
        border-bottom: 1px solid var(--surface-border);
        max-height: 160px;
        flex-direction: row;
      }

      .chat-list {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.75rem;
        gap: 0.75rem;
      }

      .chat-user {
        flex: 0 0 auto;
        min-width: 150px;
        margin-bottom: 0;
      }

      .messages-container {
        min-height: 300px;
      }

      .message-bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <header>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">
          <h1>🎯 EventHub</h1>
        </div>
        <div class="navbar-menu">
          <a href="index.html" class="nav-link">Home</a>
          <a href="#" class="nav-link" onclick="(function(){var u=JSON.parse(localStorage.getItem('user')||'{}');window.location.href=u.role==='admin'?'admin-dashboard.html':'user-dashboard.html';return false;})(); return false;">Dashboard</a>
          <a href="chat.html" class="nav-link active">Messages</a>
          <button id="logoutBtn" class="nav-link btn-danger">Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <!-- Chat Section -->
    <section class="chat-section">
      <div class="chat-container">
        <!-- Chat Sidebar -->
        <aside class="chat-sidebar">
          <div class="chat-sidebar-header">
            <h3>👥 Contacts</h3>
          </div>
          <div id="chatList" class="chat-list">
            <p class="loading">Loading contacts...</p>
          </div>
        </aside>

        <!-- Chat Window -->
        <div class="chat-window">
          <div id="chatHeader" class="chat-header">
            <h3>Select a conversation</h3>
            <small>Choose a contact from the left to start chatting</small>
          </div>

          <div id="messagesContainer" class="messages-container">
            <div class="empty-state">
              <span class="empty-state-icon">💬</span>
              <p>No messages yet. Select a contact to start chatting!</p>
            </div>
          </div>

          <div id="chatInputArea" class="chat-input-area" style="display: none;">
            <form id="messageForm" class="chat-input-form">
              <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message..." 
                autocomplete="off"
                required
              >
              <button type="submit">Send ➤</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js?v=3"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script src="js/chat.js?v=3"></script>
</body>
</html>
