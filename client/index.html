<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Events Discovery Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>🎯 EventHub</h1>
      </div>
      <div class="navbar-menu">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="#events" class="nav-link">Events</a>
        <div class="auth-links" id="authLinks">
          <a href="login.html" class="nav-link btn-primary">Login</a>
          <a href="register.html" class="nav-link btn-secondary">Register</a>
        </div>
        <div class="user-menu" id="userMenu" style="display: none;">
          <a href="user-dashboard.html" class="nav-link">Dashboard</a>
          <a href="chat.html" class="nav-link">Messages</a>
          <button id="logoutBtn" class="nav-link btn-danger">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h2>Discover Amazing Local Events</h2>
      <p>Connect, Learn, and Grow with Your Community</p>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search events by name...">
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="hackathon">Hackathon</option>
          <option value="workshop">Workshop</option>
          <option value="competition">Competition</option>
          <option value="conference">Conference</option>
          <option value="meetup">Meetup</option>
          <option value="webinar">Webinar</option>
        </select>
        <input type="text" id="locationFilter" placeholder="Filter by location...">
        <button id="searchBtn" class="btn-primary">Search</button>
      </div>
    </div>
  </section>

  <!-- Events Grid -->
  <section class="events-section" id="events">
    <div class="container">
      <h2>Upcoming Events</h2>
      <div class="events-grid" id="eventsGrid">
        <div class="loading">Loading events...</div>
      </div>
      
      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
