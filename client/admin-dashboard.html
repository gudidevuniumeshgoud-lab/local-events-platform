<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - EventHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>🎯 EventHub Admin</h1>
      </div>
      <div class="navbar-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="admin-dashboard.html" class="nav-link active">Dashboard</a>
        <a href="admin-messages.html" class="nav-link">User Messages</a>
        <button id="logoutBtn" class="nav-link btn-danger">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="user-profile">
        <div class="user-avatar">👨‍💼</div>
        <h3 id="adminName">Admin</h3>
        <p id="adminEmail">admin@eventhub.com</p>
        <p id="adminRole" style="font-size: 0.8rem; color: #ef4444;">Admin</p>
      </div>
      <nav class="dashboard-nav">
        <a href="admin-dashboard.html" class="nav-item active">
          <span>📊</span> Overview
        </a>
        <a href="admin-dashboard.html" class="nav-item">
          <span>📅</span> Manage Events
        </a>
        <a href="admin-dashboard.html" class="nav-item">
          <span>👥</span> View Users
        </a>
        <a href="admin-messages.html" class="nav-item">
          <span>💬</span> Messages
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content">
      <div class="section-header">
        <h2>Welcome Admin! 👋</h2>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📅</div>
          <h4>Total Events</h4>
          <p id="totalEvents" class="stat-number">0</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <h4>Total Users</h4>
          <p id="totalUsers" class="stat-number">0</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📝</div>
          <h4>Total Registrations</h4>
          <p id="totalRegistrations" class="stat-number">0</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💬</div>
          <h4>New Messages</h4>
          <p id="newMessages" class="stat-number">0</p>
        </div>
      </div>

      <div class="quick-actions">
        <a href="admin-messages.html" class="btn-primary">
          <span>💬</span> View Messages
        </a>
        <a href="create-event.html" class="btn-secondary">
          <span>📝</span> Create Event
        </a>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check admin access
    function checkAdminAccess() {
      if (!requireAuth()) return false;
      
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      if (user.role !== 'admin') {
        showToast('Admin access required', 'error');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return false;
      }
      
      return true;
    }

    // Load admin data
    async function loadAdminDashboard() {
      if (!checkAdminAccess()) return;

      const user = JSON.parse(localStorage.getItem('user') || '{}');
      document.getElementById('adminName').textContent = user.name || 'Admin';
      document.getElementById('adminEmail').textContent = user.email;

      loadStats();
    }

    async function loadStats() {
      try {
        const token = localStorage.getItem('token');
        
        // Get events count
        const eventsRes = await fetch('http://localhost:5000/api/events?page=1&limit=1', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const eventsData = await eventsRes.json();
        document.getElementById('totalEvents').textContent = eventsData.total || 0;

        // Get users count
        const usersRes = await fetch('http://localhost:5000/api/users?page=1&limit=1', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const usersData = await usersRes.json();
        document.getElementById('totalUsers').textContent = usersData.total || 0;

        // Get messages count
        const messagesRes = await fetch('http://localhost:5000/api/messages', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const messagesData = await messagesRes.json();
        document.getElementById('newMessages').textContent = messagesData.unreadCount || 0;

        document.getElementById('totalRegistrations').textContent = '0';
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', loadAdminDashboard);
  </script>
</body>
</html>
