<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EventHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container">
      <div class="navbar-brand">
        <h1>🎯 EventHub</h1>
      </div>
      <div class="navbar-menu">
        <a href="index.html" class="nav-link">Home</a>
      </div>
    </div>
  </nav>
  </header>

  <main>
  <!-- Register Form -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-form">
        <h2>Create Your Account</h2>
        <form id="registerForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
          </div>
          <button type="submit" class="btn-primary full-width">Register</button>
        </form>
        <p class="auth-link">
          Already have an account? <a href="login.html">Login here</a>
        </p>
      </div>
    </div>
    </div>
  </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <h3>🎯 EventHub</h3>
        <p>Discover amazing local events and connect with your community.</p>
      </div>
      <div class="footer-section">
        <h3>Quick Links</h3>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </div>
      <div class="footer-section">
        <h3>Contact</h3>
        <p>support@eventhub.com</p>
        <p>+1 234 567 8900</p>
      </div>
    </div>
    <div class="footer-bottom">
      &copy; 2026 EventHub. All rights reserved.
    </div>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showToast('Registration successful!', 'success');
          
          setTimeout(() => {
            window.location.href = 'user-dashboard.html';
          }, 1500);
        } else {
          showToast(data.message, 'error');
        }
      } catch (error) {
        showToast('Registration failed', 'error');
      }
    });
  </script>
</body>
</html>
