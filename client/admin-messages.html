<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Messages - EventHub</title>
  <meta name="description" content="Admin message center for EventHub platform.">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="stylesheet" href="css/responsive.css?v=3">
  <style>
    .admin-messages-section {
      padding: 2rem;
      min-height: calc(100vh - 80px);
    }

    .admin-messages-container {
      display: grid;
      grid-template-columns: 300px 1fr;
      background: var(--surface-color);
      border: 1px solid var(--surface-border);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      max-width: 1200px;
      margin: 0 auto;
      height: calc(100vh - 150px);
      min-height: 550px;
    }

    .users-list {
      border-right: 1px solid var(--surface-border);
      background: rgba(15, 23, 42, 0.6);
      display: flex;
      flex-direction: column;
    }

    .users-list-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--surface-border);
    }

    .users-list h3 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--text-dark);
    }

    .users-list-body {
      overflow-y: auto;
      padding: 0.75rem;
      flex: 1;
    }

    .user-item {
      padding: 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      margin-bottom: 0.5rem;
    }

    .user-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(139, 92, 246, 0.3);
    }

    .user-item.active {
      background: rgba(139, 92, 246, 0.15);
      border-color: var(--primary-color);
    }

    .user-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
      color: var(--text-dark);
    }

    .user-email {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .messages-view {
      display: flex;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.3);
    }

    .message-header {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--surface-border);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
    }

    .message-header h3 {
      margin: 0;
      font-size: 1.15rem;
      color: var(--text-dark);
    }

    .message-header small {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      animation: fadeInUp 0.3s ease;
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message.received {
      justify-content: flex-start;
    }

    .message-bubble {
      padding: 0.875rem 1.25rem;
      border-radius: 1rem;
      max-width: 70%;
      word-wrap: break-word;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, var(--primary-color), #6d28d9);
      color: white;
      border-bottom-right-radius: 0.25rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .message.received .message-bubble {
      background: var(--surface-color);
      color: var(--text-dark);
      border: 1px solid var(--surface-border);
      border-bottom-left-radius: 0.25rem;
    }

    .message-time {
      font-size: 0.72rem;
      margin-top: 0.4rem;
      opacity: 0.65;
      text-align: right;
    }

    .input-area {
      padding: 1.25rem 1.75rem;
      border-top: 1px solid var(--surface-border);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
    }

    .input-form {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .input-form input {
      flex: 1;
      padding: 0.875rem 1.25rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--surface-border);
      border-radius: 2rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      transition: all 0.3s ease;
    }

    .input-form input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .input-form input::placeholder {
      color: var(--text-light);
    }

    .input-form button {
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, var(--primary-color), #6d28d9);
      color: white;
      border: none;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .input-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-light);
      margin: auto;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .empty-state p {
      font-size: 1rem;
      max-width: 250px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Custom scrollbar */
    .messages-area::-webkit-scrollbar,
    .users-list-body::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-thumb,
    .users-list-body::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 10px; }

    @media (max-width: 768px) {
      .admin-messages-container {
        grid-template-columns: 1fr;
        height: auto;
        min-height: auto;
      }

      .users-list {
        border-right: none;
        border-bottom: 1px solid var(--surface-border);
        max-height: 160px;
      }

      .users-list-body {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 0.75rem;
      }

      .user-item {
        flex: 0 0 auto;
        min-width: 150px;
        margin-bottom: 0;
      }

      .message-bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <header>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">
          <h1>🎯 EventHub Admin</h1>
        </div>
        <div class="navbar-menu">
          <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
          <a href="admin-messages.html" class="nav-link active">User Messages</a>
          <button id="logoutBtn" class="nav-link btn-danger">Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <!-- Admin Messages Section -->
    <section class="admin-messages-section">
      <div class="admin-messages-container">
        <!-- Users List -->
        <aside class="users-list">
          <div class="users-list-header">
            <h3>👥 Users</h3>
          </div>
          <div class="users-list-body" id="usersList">
            <p class="loading">Loading users...</p>
          </div>
        </aside>

        <!-- Messages View -->
        <div class="messages-view">
          <div class="message-header">
            <h3>Select a user to view messages</h3>
            <small>Choose a user from the left panel</small>
          </div>

          <div class="messages-area" id="messagesArea">
            <div class="empty-state">
              <span class="empty-state-icon">💬</span>
              <p>Select a user to start viewing messages</p>
            </div>
          </div>

          <div class="input-area" id="inputArea" style="display: none;">
            <form id="messageForm" class="input-form">
              <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your response..." 
                autocomplete="off"
                required
              >
              <button type="submit">Send ➤</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js?v=2"></script>
  <script src="js/utils.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script>
    let currentUserId = null;

    async function loadAdminMessages() {
      if (!requireAuth()) return;

      const user = JSON.parse(localStorage.getItem('user') || '{}');
      if (user.role !== 'admin') {
        showToast('Only admins can access this page', 'error');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      loadUsersList();
      setupMessageForm();
    }

    async function loadUsersList() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_BASE_URL}/users?page=1&limit=100&role=user`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();

        if (data.success && data.users && data.users.length > 0) {
          displayUsersList(data.users);
        } else {
          document.getElementById('usersList').innerHTML = '<p style="padding: 1rem; color: var(--text-light);">No users found</p>';
        }
      } catch (error) {
        console.error('Error loading users:', error);
      }
    }

    function displayUsersList(users) {
      const usersList = document.getElementById('usersList');
      usersList.innerHTML = users.map(user => `
        <div class="user-item" onclick="selectUser('${user._id}', '${user.name}', '${user.email}')">
          <div class="user-name">${user.name}</div>
          <div class="user-email">${user.email}</div>
        </div>
      `).join('');
    }

    function selectUser(userId, userName, userEmail) {
      currentUserId = userId;

      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');

      document.querySelector('.message-header').innerHTML = `
        <h3>💬 ${userName}</h3>
        <small>${userEmail}</small>
      `;

      document.getElementById('inputArea').style.display = 'block';
      loadConversation(userId);
    }

    async function loadConversation(userId) {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_BASE_URL}/messages/conversation/${userId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();

        if (data.success) {
          displayMessages(data.messages);
        }
      } catch (error) {
        console.error('Error loading conversation:', error);
      }
    }

    function displayMessages(messages) {
      const container = document.getElementById('messagesArea');
      const currentUser = JSON.parse(localStorage.getItem('user') || '{}');

      if (!messages || messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="empty-state-icon">📧</span>
            <p>No messages yet. Start the conversation!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = messages.map((msg) => {
        const isSent = msg.senderId._id === currentUser.id;
        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            <div>
              <div class="message-bubble">${msg.content}</div>
              <div class="message-time">
                ${new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
              </div>
            </div>
          </div>
        `;
      }).join('');

      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 100);
    }

    function setupMessageForm() {
      const form = document.getElementById('messageForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const content = document.getElementById('messageInput').value.trim();

        if (!content) {
          showToast('Message cannot be empty', 'warning');
          return;
        }

        if (!currentUserId) {
          showToast('Please select a user first', 'warning');
          return;
        }

        try {
          const token = localStorage.getItem('token');
          const response = await fetch(`${API_BASE_URL}/messages`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ receiverId: currentUserId, content })
          });

          const data = await response.json();

          if (data.success) {
            document.getElementById('messageInput').value = '';
            loadConversation(currentUserId);
            showToast('Message sent!', 'success');
          }
        } catch (error) {
          console.error('Error sending message:', error);
        }
      });
    }

    document.addEventListener('DOMContentLoaded', loadAdminMessages);
  </script>
</body>
</html>
